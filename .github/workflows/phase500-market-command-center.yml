name: Phase 5.0 Market Command Center CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [phase500-market-command-center]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Verify market safety boundaries
        working-directory: .
        shell: bash
        run: |
          grep -F 'page: "market"' frontend-react/src/routing/useAppRoute.ts
          grep -F 'optionChainSelectionAuthority' frontend-react/src/market/MarketCommandCenter.tsx
          grep -F 'optionChainExecutionAuthority' frontend-react/src/market/MarketCommandCenter.tsx
          grep -F 'cannot place or authorize trades' frontend-react/src/market/MarketCommandCenter.tsx
