name: Phase 5.1 Thesis Readiness CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [phase510-thesis-readiness-workspace]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Verify thesis safety boundaries
        working-directory: .
        shell: bash
        run: |
          grep -F 'page: "theses"' frontend-react/src/routing/useAppRoute.ts
          grep -F 'riskAuthority' frontend-react/src/theses/ThesisReadinessWorkspace.tsx
          grep -F 'tradePlanAuthority' frontend-react/src/theses/ThesisReadinessWorkspace.tsx
          grep -F 'executionAuthority' frontend-react/src/theses/ThesisReadinessWorkspace.tsx
          grep -F 'does not fabricate thesis history' frontend-react/src/theses/ThesisReadinessWorkspace.tsx
