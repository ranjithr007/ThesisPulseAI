name: Phase 4.6 Option-Chain Audit CI

on:
  push:
    branches:
      - feature/phase46-option-chain-audit
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase46-option-chain-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    name: Option-chain audit acceptance and regressions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore solution
        run: dotnet restore ThesisPulseAI.sln
      - name: Build solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore
      - name: Build Phase 4.6 audit contract
        run: dotnet build tests/phase46-option-chain-audit/dotnet/ThesisPulse.Phase46OptionChainAudit.Tests.csproj --configuration Release
      - name: Verify audit endpoint contract
        shell: bash
        run: |
          grep -F '/api/v1/internal/fusion/option-chain/compose' src/ThesisPulse.Signal.Service/OptionChainFusionAuditEndpoints.cs
          grep -F 'Results.UnprocessableEntity(response)' src/ThesisPulse.Signal.Service/OptionChainFusionAuditEndpoints.cs
          grep -F 'result.Request' src/ThesisPulse.Signal.Service/OptionChainFusionAuditEndpoints.cs
          grep -F 'app.MapOptionChainFusionAuditEndpoints();' src/ThesisPulse.Signal.Service/Program.cs
          grep -F 'IReadOnlyCollection<string> GateFailures' src/ThesisPulse.Signal.Service/OptionChainFusionAuditResponse.cs
      - name: Run Phase 4.5 orchestration regression
        run: dotnet run --project tests/phase45-option-chain-orchestration/dotnet/ThesisPulse.Phase45OptionChainOrchestration.Tests.csproj --configuration Release
      - name: Run Phase 4.4 runtime regression
        run: dotnet run --project tests/phase44-option-chain-runtime/dotnet/ThesisPulse.Phase44OptionChainRuntime.Tests.csproj --configuration Release
      - name: Run Fusion lifecycle regression
        run: dotnet run --project tests/fusion-signal/dotnet/ThesisPulse.FusionSignal.Tests.csproj --configuration Release
