name: Phase 3.7 Portfolio Projection CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  acceptance:
    name: Automatic fill-to-portfolio acceptance and regressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore solution
        run: dotnet restore ThesisPulseAI.sln
      - name: Build solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore --verbosity minimal
      - name: Run Phase 3.7 acceptance
        shell: bash
        run: |
          set -o pipefail
          dotnet run --project tests/phase37-portfolio-projection/dotnet/ThesisPulse.Phase37PortfolioProjection.Tests.csproj --configuration Release 2>&1 | tee phase37-tests.log
      - name: Run deterministic portfolio regression
        run: dotnet run --project tests/portfolio/dotnet/ThesisPulse.Portfolio.Tests.csproj --configuration Release
      - name: Run Phase 3.6 regression
        run: dotnet run --project tests/phase36-paper-fill/dotnet/ThesisPulse.Phase36PaperFill.Tests.csproj --configuration Release
      - name: Run Phase 3.5 regression
        run: dotnet run --project tests/phase35-paper-submission/dotnet/ThesisPulse.Phase35PaperSubmission.Tests.csproj --configuration Release
      - name: Run deterministic execution regression
        run: dotnet run --project tests/execution/dotnet/ThesisPulse.Execution.Tests.csproj --configuration Release
      - name: Run database migrator regression
        run: dotnet run --project tests/database/dotnet/ThesisPulse.DatabaseMigrator.Tests.csproj --configuration Release
      - name: Upload Phase 3.7 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase37-portfolio-projection-log
          path: phase37-tests.log
          if-no-files-found: error
          retention-days: 7
