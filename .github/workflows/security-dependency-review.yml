name: Security Dependency Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check dependency graph availability
        id: graph
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const pullRequest = context.payload.pull_request;
            const report = {
              httpStatus: null,
              message: null,
              documentationUrl: null,
              changeCount: null,
              remediation: 'Enable repository Settings > Security > Code security and analysis > Dependency graph, then rerun failed jobs.',
              runbook: 'docs/security/repository-security.md#handling-an-unavailable-dependency-graph',
            };
            try {
              const response = await github.request(
                'GET /repos/{owner}/{repo}/dependency-graph/compare/{basehead}',
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  basehead: `${pullRequest.base.sha}...${pullRequest.head.sha}`,
                  headers: { 'X-GitHub-Api-Version': '2022-11-28' },
                },
              );
              report.httpStatus = response.status;
              if (Array.isArray(response.data)) {
                report.changeCount = response.data.length;
              } else if (Array.isArray(response.data?.changes)) {
                report.changeCount = response.data.changes.length;
              } else {
                report.changeCount = 0;
              }
            } catch (error) {
              report.httpStatus = error.status ?? null;
              report.message = error.response?.data?.message ?? error.message ?? error.name;
              report.documentationUrl = error.response?.data?.documentation_url ?? null;
            }
            const available = report.httpStatus === 200;
            core.setOutput('available', available ? 'true' : 'false');
            core.setOutput('http_status', String(report.httpStatus ?? 'unknown'));
            core.setOutput('api_message', report.message ?? 'none');
            core.info(`Dependency graph API status: ${report.httpStatus}`);
            core.info(`Dependency graph API message: ${report.message ?? 'none'}`);
            core.info(`Dependency graph change count: ${report.changeCount}`);
            core.info(`Dependency graph remediation: ${report.remediation}`);
            core.info(`Dependency graph runbook: ${report.runbook}`);
            fs.writeFileSync(
              'dependency-graph-api.json',
              JSON.stringify(report, null, 2),
              { encoding: 'utf8' },
            );

      - name: Review dependency changes
        id: review
        if: steps.graph.outputs.available == 'true'
        continue-on-error: true
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0-only, AGPL-3.0-or-later, SSPL-1.0
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 120

      - name: Summarize dependency policy findings
        if: always()
        shell: python
        env:
          VULNERABLE_CHANGES: ${{ steps.review.outputs.vulnerable-changes }}
          INVALID_LICENSE_CHANGES: ${{ steps.review.outputs.invalid-license-changes }}
          DENIED_CHANGES: ${{ steps.review.outputs.denied-changes }}
          DEPENDENCY_CHANGES: ${{ steps.review.outputs.dependency-changes }}
          COMMENT_CONTENT: ${{ steps.review.outputs.comment-content }}
          REVIEW_OUTCOME: ${{ steps.review.outcome }}
          GRAPH_AVAILABLE: ${{ steps.graph.outputs.available }}
          GRAPH_HTTP_STATUS: ${{ steps.graph.outputs.http_status }}
          GRAPH_API_MESSAGE: ${{ steps.graph.outputs.api_message }}
        run: |
          import json
          import os

          report = {
              "graphAvailable": os.environ.get("GRAPH_AVAILABLE", "false") == "true",
              "graphHttpStatus": os.environ.get("GRAPH_HTTP_STATUS", "unknown"),
              "graphApiMessage": os.environ.get("GRAPH_API_MESSAGE", "none"),
              "reviewOutcome": os.environ.get("REVIEW_OUTCOME", "skipped"),
              "dependencyChangeCount": 0,
              "commentContent": os.environ.get("COMMENT_CONTENT", "")[:4000],
              "vulnerable": [],
              "invalidLicense": [],
              "denied": [],
          }

          raw_changes = os.environ.get("DEPENDENCY_CHANGES", "").strip()
          if raw_changes:
              try:
                  changes = json.loads(raw_changes)
                  report["dependencyChangeCount"] = len(changes) if isinstance(changes, list) else 1
              except json.JSONDecodeError:
                  report["dependencyChangeCount"] = -1

          mappings = (
              ("vulnerable", "VULNERABLE_CHANGES"),
              ("invalidLicense", "INVALID_LICENSE_CHANGES"),
              ("denied", "DENIED_CHANGES"),
          )
          print(f"Dependency graph available: {report['graphAvailable']}")
          print(f"Dependency graph HTTP status: {report['graphHttpStatus']}")
          print(f"Dependency graph API message: {report['graphApiMessage']}")
          print(f"Dependency review outcome: {report['reviewOutcome']}")
          print(f"Dependency changes reported: {report['dependencyChangeCount']}")
          for label, variable in mappings:
              raw = os.environ.get(variable, "").strip()
              if not raw:
                  print(f"{label}: 0 reported changes")
                  continue
              try:
                  items = json.loads(raw)
              except json.JSONDecodeError:
                  report[label].append({"package": "unknown-package", "identifier": "invalid-json-output"})
                  print(f"{label}: output was not valid JSON")
                  continue
              if not isinstance(items, list):
                  items = [items]
              print(f"{label}: {len(items)} reported change(s)")
              for item in items:
                  if not isinstance(item, dict):
                      continue
                  package = (
                      item.get("package_url")
                      or item.get("packageUrl")
                      or item.get("name")
                      or item.get("dependencyName")
                      or "unknown-package"
                  )
                  identifier = (
                      item.get("ghsa_id")
                      or item.get("ghsaId")
                      or item.get("advisory_id")
                      or item.get("license")
                      or "no-advisory-or-license-id"
                  )
                  report[label].append({"package": str(package), "identifier": str(identifier)})
                  print(f"  - {package}: {identifier}")

          with open("dependency-review-diagnostics.json", "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2, sort_keys=True)

      - name: Upload dependency review diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-review-diagnostics
          path: |
            dependency-review-diagnostics.json
            dependency-graph-api.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce dependency review result
        if: always() && (steps.graph.outputs.available != 'true' || steps.review.outcome == 'failure')
        shell: bash
        run: |
          if [[ "${{ steps.graph.outputs.available }}" != "true" ]]; then
            cat <<'EOF'
          Dependency graph is unavailable, so dependency review cannot prove that this pull request is safe.

          Required owner action:
            1. Open repository Settings.
            2. Open Security > Code security and analysis.
            3. Enable Dependency graph.
            4. Re-run failed jobs for Security Dependency Review.

          Runbook: docs/security/repository-security.md#handling-an-unavailable-dependency-graph
          Issue: #166 Phase 6.4 dependency and supply-chain policy hardening

          This gate is intentionally fail-closed. Do not add warn-only, skip this job, or treat skipped dependency-review outputs as a pass.
          EOF
          else
            echo "Dependency review found a vulnerability or disallowed license. See the action summary and sanitized diagnostic artifact."
            echo "Runbook: docs/security/repository-security.md#handling-a-dependency-finding"
            echo "Issue: #166 Phase 6.4 dependency and supply-chain policy hardening"
          fi
          exit 1
