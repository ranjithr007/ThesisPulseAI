name: Phase 4.7 Option-Chain Worker CI

on:
  push:
    branches:
      - feature/phase47-option-chain-worker
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase47-option-chain-worker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    name: Option-chain worker acceptance and regressions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore solution
        run: dotnet restore ThesisPulseAI.sln
      - name: Build solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore
      - name: Run Phase 4.7 worker acceptance
        run: dotnet run --project tests/phase47-option-chain-worker/dotnet/ThesisPulse.Phase47OptionChainWorker.Tests.csproj --configuration Release
      - name: Verify SQL leasing and endpoint contracts
        shell: bash
        run: |
          grep -F 'WITH (UPDLOCK, READPAST, ROWLOCK)' src/ThesisPulse.Signal.Service/SqlServerOptionChainWorkQueue.cs
          grep -F 'lease_expires_at_utc <= @now_utc' src/ThesisPulse.Signal.Service/SqlServerOptionChainWorkQueue.cs
          grep -F 'UX_option_chain_work_queue_snapshot_policy' database/migrations/V0019__create_option_chain_work_queue.sql
          grep -F '/api/v1/internal/option-chain/worker/metrics' src/ThesisPulse.Signal.Service/OptionChainWorkerEndpoints.cs
          grep -F '/api/v1/internal/option-chain/evidence/latest/{instrumentKey}' src/ThesisPulse.Signal.Service/OptionChainWorkerEndpoints.cs
          grep -F 'app.MapOptionChainWorkerEndpoints();' src/ThesisPulse.Signal.Service/Program.cs
      - name: Run Phase 4.6 audit regression
        run: dotnet build tests/phase46-option-chain-audit/dotnet/ThesisPulse.Phase46OptionChainAudit.Tests.csproj --configuration Release
      - name: Run Phase 4.5 orchestration regression
        run: dotnet run --project tests/phase45-option-chain-orchestration/dotnet/ThesisPulse.Phase45OptionChainOrchestration.Tests.csproj --configuration Release
      - name: Run Phase 4.4 runtime regression
        run: dotnet run --project tests/phase44-option-chain-runtime/dotnet/ThesisPulse.Phase44OptionChainRuntime.Tests.csproj --configuration Release
      - name: Run Fusion lifecycle regression
        run: dotnet run --project tests/fusion-signal/dotnet/ThesisPulse.FusionSignal.Tests.csproj --configuration Release
