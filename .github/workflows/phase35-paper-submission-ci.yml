name: Phase 3.5 PAPER Submission CI

on:
  pull_request:
    branches:
      - main
      - feature/automatic-plan-ready-paper-execution
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  acceptance:
    name: PAPER submission acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run Phase 3.5 acceptance
        shell: bash
        run: |
          set -o pipefail
          dotnet run --project tests/phase35-paper-submission/dotnet/ThesisPulse.Phase35PaperSubmission.Tests.csproj --configuration Release 2>&1 | tee phase35-tests.log
      - name: Upload Phase 3.5 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase35-paper-submission-log
          path: phase35-tests.log
          if-no-files-found: error
          retention-days: 7
