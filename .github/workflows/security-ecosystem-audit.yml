name: Security Ecosystem Audit

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  schedule:
    - cron: "40 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nuget-audit:
    name: NuGet vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore solution
        run: dotnet restore ThesisPulseAI.sln
      - name: Reject vulnerable NuGet packages
        shell: pwsh
        run: |
          $output = & dotnet list ThesisPulseAI.sln package --vulnerable --include-transitive 2>&1
          $exitCode = $LASTEXITCODE
          $text = ($output | Out-String)
          Write-Host $text
          if ($exitCode -ne 0) {
            throw "NuGet vulnerability inspection failed with exit code $exitCode."
          }
          if ($text -match "has the following vulnerable packages") {
            throw "One or more vulnerable NuGet packages were detected."
          }

  npm-audit:
    name: npm vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json
      - name: Install locked dependencies
        run: npm ci
      - name: Reject high or critical npm vulnerabilities
        run: npm audit --audit-level=high

  python-audit:
    name: Python vulnerability audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-python/pyproject.toml
      - name: Install project and pinned audit tool
        run: python -m pip install --upgrade pip && python -m pip install -e "./ai-python[dev]"
      - name: Audit Python project dependencies
        run: pip-audit ./ai-python --strict --progress-spinner off
