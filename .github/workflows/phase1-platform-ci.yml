name: Phase 1 Platform CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - phase-1/platform-foundation

permissions:
  contents: read

jobs:
  dotnet:
    name: .NET build and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore ThesisPulseAI.sln
      - name: Build with diagnostics
        shell: bash
        run: |
          set +e
          dotnet build ThesisPulseAI.sln --configuration Release --no-restore --verbosity minimal > dotnet-build.log 2>&1
          status=$?
          echo "$status" > dotnet-build.status
          cat dotnet-build.log
          exit 0
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-build-log
          path: |
            dotnet-build.log
            dotnet-build.status
          if-no-files-found: error
          retention-days: 7
      - name: Enforce build result
        shell: bash
        run: exit "$(cat dotnet-build.status)"
      - name: Test
        run: dotnet test ThesisPulseAI.sln --configuration Release --no-build --verbosity normal
      - name: Contract fixture tests
        run: dotnet run --project tests/contracts/dotnet/ThesisPulse.ContractTests.csproj --configuration Release --no-build
      - name: Database migrator tests
        run: dotnet run --project tests/database/dotnet/ThesisPulse.DatabaseMigrator.Tests.csproj --configuration Release --no-build
      - name: Market Data foundation tests
        run: dotnet run --project tests/marketdata/dotnet/ThesisPulse.MarketData.Tests.csproj --configuration Release
      - name: Market Data recovery tests with diagnostics
        shell: bash
        run: |
          set +e
          dotnet run --project tests/marketdata-recovery/dotnet/ThesisPulse.MarketData.RecoveryTests.csproj --configuration Release > market-data-recovery-tests.log 2>&1
          status=$?
          echo "$status" > market-data-recovery-tests.status
          cat market-data-recovery-tests.log
          exit 0
      - name: Upload recovery test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-data-recovery-test-log
          path: |
            market-data-recovery-tests.log
            market-data-recovery-tests.status
          if-no-files-found: error
          retention-days: 7
      - name: Enforce recovery test result
        shell: bash
        run: exit "$(cat market-data-recovery-tests.status)"

  python:
    name: Python lint and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Test
        run: pytest

  frontend:
    name: React typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
