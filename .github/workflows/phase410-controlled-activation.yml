name: Phase 4.10 Controlled Activation CI

on:
  push:
    branches:
      - feature/phase410-controlled-activation
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase410-controlled-activation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness:
    name: Controlled activation and authority-boundary verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore ThesisPulseAI.sln

      - name: Build solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore

      - name: Verify disabled defaults and secret placeholders
        shell: bash
        run: |
          grep -F '"Mode": "DISABLED"' src/ThesisPulse.Signal.Service/appsettings.json
          grep -F '"OperationalSmokeEnabled": false' src/ThesisPulse.Signal.Service/appsettings.json
          grep -F '"WorkerExecutionEnabled": false' src/ThesisPulse.Signal.Service/appsettings.json
          grep -F '"PythonInternalApiKey": ""' src/ThesisPulse.Signal.Service/appsettings.json
          grep -F '"ConnectionString": ""' src/ThesisPulse.Signal.Service/appsettings.json

      - name: Verify readiness and authority boundaries
        shell: bash
        run: |
          grep -F '/api/v1/internal/option-chain/production-readiness' src/ThesisPulse.Signal.Service/OptionChainProductionReadiness.cs
          grep -F '/api/v1/internal/option-chain/operational-smoke' src/ThesisPulse.Signal.Service/OptionChainProductionReadiness.cs
          grep -F 'SelectionAuthority: false' src/ThesisPulse.Signal.Service/OptionChainProductionReadiness.cs
          grep -F 'ExecutionAuthority: false' src/ThesisPulse.Signal.Service/OptionChainProductionReadiness.cs
          grep -F 'optionChainSelectionAuthority = false' src/ThesisPulse.Signal.Service/Program.cs
          grep -F 'optionChainExecutionAuthority = false' src/ThesisPulse.Signal.Service/Program.cs
          grep -F 'Platform__LiveExecutionEnabled' docs/phase410-controlled-activation.md

      - name: Run Phase 4.9 execution regression
        run: dotnet run --project tests/phase49-option-chain-execution/dotnet/ThesisPulse.Phase49OptionChainExecution.Tests.csproj --configuration Release

      - name: Run Phase 4.8 intake regression
        run: dotnet run --project tests/phase48-option-chain-intake/dotnet/ThesisPulse.Phase48OptionChainIntake.Tests.csproj --configuration Release

      - name: Run Phase 4.7 queue regression
        run: dotnet run --project tests/phase47-option-chain-worker/dotnet/ThesisPulse.Phase47OptionChainWorker.Tests.csproj --configuration Release
