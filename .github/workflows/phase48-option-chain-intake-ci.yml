name: Phase 4.8 Option-Chain Intake CI

on:
  push:
    branches:
      - feature/phase48-option-chain-intake
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase48-option-chain-intake-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    name: Option-chain intake acceptance and regressions
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore ThesisPulseAI.sln

      - name: Build solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore

      - name: Run Phase 4.8 intake acceptance
        run: dotnet run --project tests/phase48-option-chain-intake/dotnet/ThesisPulse.Phase48OptionChainIntake.Tests.csproj --configuration Release

      - name: Verify deterministic SQL discovery and operational contracts
        shell: bash
        run: |
          grep -F "snapshot.[snapshot_status] = 'COMPLETE'" src/ThesisPulse.Signal.Service/SqlServerOptionChainWorkCandidateSource.cs
          grep -F "snapshot.[quality_status] = 'VALID'" src/ThesisPulse.Signal.Service/SqlServerOptionChainWorkCandidateSource.cs
          grep -F "snapshot.[is_point_in_time_eligible] = 1" src/ThesisPulse.Signal.Service/SqlServerOptionChainWorkCandidateSource.cs
          grep -F "NOT EXISTS" src/ThesisPulse.Signal.Service/SqlServerOptionChainWorkCandidateSource.cs
          grep -F "ORDER BY snapshot.[received_at_utc], snapshot.[event_at_utc]" src/ThesisPulse.Signal.Service/SqlServerOptionChainWorkCandidateSource.cs
          grep -F 'WorkerDiscoveryEnabled' src/ThesisPulse.Signal.Service/OptionChainRuntimeRegistration.cs
          grep -F '/api/v1/internal/option-chain/intake/metrics' src/ThesisPulse.Signal.Service/OptionChainWorkerEndpoints.cs
          grep -F '"WorkerDiscoveryEnabled": false' src/ThesisPulse.Signal.Service/appsettings.json
          grep -F 'optionChainSelectionAuthority = false' src/ThesisPulse.Signal.Service/Program.cs
          grep -F 'optionChainExecutionAuthority = false' src/ThesisPulse.Signal.Service/Program.cs

      - name: Run Phase 4.7 worker regression
        run: dotnet run --project tests/phase47-option-chain-worker/dotnet/ThesisPulse.Phase47OptionChainWorker.Tests.csproj --configuration Release

      - name: Run Phase 4.6 audit regression
        run: dotnet build tests/phase46-option-chain-audit/dotnet/ThesisPulse.Phase46OptionChainAudit.Tests.csproj --configuration Release

      - name: Run Phase 4.5 orchestration regression
        run: dotnet run --project tests/phase45-option-chain-orchestration/dotnet/ThesisPulse.Phase45OptionChainOrchestration.Tests.csproj --configuration Release

      - name: Run Phase 4.4 runtime regression
        run: dotnet run --project tests/phase44-option-chain-runtime/dotnet/ThesisPulse.Phase44OptionChainRuntime.Tests.csproj --configuration Release

      - name: Run Fusion lifecycle regression
        run: dotnet run --project tests/fusion-signal/dotnet/ThesisPulse.FusionSignal.Tests.csproj --configuration Release
