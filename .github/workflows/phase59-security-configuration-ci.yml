name: Phase 5.9 Security Configuration CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [phase59-repository-security-gates]

permissions:
  contents: read

jobs:
  security-configuration:
    name: Security configuration and platform regressions
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-python/pyproject.toml

      - name: Validate security configuration
        shell: pwsh
        run: ./scripts/security/Test-ThesisPulseSecurityConfiguration.ps1

      - name: Restore .NET solution
        run: dotnet restore ThesisPulseAI.sln

      - name: Build .NET solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore --verbosity minimal

      - name: Install Python project
        run: python -m pip install --upgrade pip && python -m pip install -e "./ai-python[dev]"

      - name: Lint Python
        working-directory: ai-python
        run: ruff check app tests

      - name: Test Python
        working-directory: ai-python
        run: pytest

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend-react
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend-react
        run: npm run build
