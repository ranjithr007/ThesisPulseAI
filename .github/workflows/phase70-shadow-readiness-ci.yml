name: Phase 7.0 SHADOW Readiness CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [phase70-shadow-readiness]

permissions:
  contents: read

jobs:
  shadow-readiness:
    name: SHADOW readiness contracts and regressions
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7

      - name: Validate repository hygiene remains intact
        shell: pwsh
        run: ./scripts/security/Test-ThesisPulseSecretHygiene.ps1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-python/pyproject.toml

      - name: Validate Phase 7.0 SHADOW readiness
        shell: pwsh
        run: ./scripts/security/Test-ThesisPulseShadowReadiness.ps1

      - name: Validate Phase 6.5 security observability remains intact
        shell: pwsh
        run: ./scripts/security/Test-ThesisPulseSecurityObservability.ps1

      - name: Validate repository security configuration remains intact
        shell: pwsh
        run: ./scripts/security/Test-ThesisPulseSecurityConfiguration.ps1

      - name: Restore .NET solution
        run: dotnet restore ThesisPulseAI.sln

      - name: Build .NET solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore --verbosity minimal

      - name: Install Python project
        run: python -m pip install --upgrade pip && python -m pip install -e "./ai-python[dev]"

      - name: Lint Python
        working-directory: ai-python
        run: ruff check app tests

      - name: Test Python
        working-directory: ai-python
        run: pytest

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend-react
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend-react
        run: npm run build
