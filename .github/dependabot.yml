version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      nuget-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: /frontend-react
    schedule:
      interval: weekly
      day: monday
      time: "03:40"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    versioning-strategy: increase-if-necessary
    groups:
      npm-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: pip
    directory: /ai-python
    schedule:
      interval: weekly
      day: monday
      time: "03:50"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      python-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Kolkata
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
