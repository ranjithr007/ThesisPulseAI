name: Phase 3.6 PAPER Fill CI

on:
  pull_request:
    branches:
      - main
      - fix/phase35-main-integration
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  acceptance:
    name: Deterministic PAPER fill acceptance and regressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore solution
        run: dotnet restore ThesisPulseAI.sln
      - name: Build solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore --verbosity minimal
      - name: Run Phase 3.6 acceptance
        shell: bash
        run: |
          set -o pipefail
          dotnet run --project tests/phase36-paper-fill/dotnet/ThesisPulse.Phase36PaperFill.Tests.csproj --configuration Release 2>&1 | tee phase36-tests.log
      - name: Run Phase 3.5 regression
        run: dotnet run --project tests/phase35-paper-submission/dotnet/ThesisPulse.Phase35PaperSubmission.Tests.csproj --configuration Release
      - name: Run Phase 3.4 regression
        run: dotnet run --project tests/phase34-automatic-paper-execution/dotnet/ThesisPulse.Phase34AutomaticPaperExecution.Tests.csproj --configuration Release
      - name: Run Phase 3.3 regression
        run: dotnet run --project tests/phase33-trade-plan-projection/dotnet/ThesisPulse.Phase33TradePlanProjection.Tests.csproj --configuration Release
      - name: Run deterministic execution regression
        run: dotnet run --project tests/execution/dotnet/ThesisPulse.Execution.Tests.csproj --configuration Release
      - name: Run Market Data foundation regression
        run: dotnet run --project tests/marketdata/dotnet/ThesisPulse.MarketData.Tests.csproj --configuration Release
      - name: Run database migrator regression
        run: dotnet run --project tests/database/dotnet/ThesisPulse.DatabaseMigrator.Tests.csproj --configuration Release
      - name: Upload Phase 3.6 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase36-paper-fill-log
          path: phase36-tests.log
          if-no-files-found: error
          retention-days: 7
