name: Phase 4.12 Rollback Reconciliation CI

on:
  push:
    branches:
      - feature/phase412-rollback-reconciliation
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase412-rollback-reconciliation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    name: Rollback enforcement and evidence reconciliation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - name: Restore solution
        run: dotnet restore ThesisPulseAI.sln

      - name: Build solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore

      - name: Verify rollback, recovery, reconciliation, and authority boundaries
        shell: bash
        run: |
          grep -F 'AutomaticRollbackEnabled' src/ThesisPulse.Signal.Service/OptionChainRollbackReconciliation.cs
          grep -F 'WorkerExecutionSuppressed' src/ThesisPulse.Signal.Service/OptionChainRollbackReconciliation.cs
          grep -F 'RECONCILIATION_DRIFT' src/ThesisPulse.Signal.Service/OptionChainRollbackReconciliation.cs
          grep -F 'WORK_LINEAGE_MISMATCH' src/ThesisPulse.Signal.Service/OptionChainRollbackReconciliation.cs
          grep -F 'SNAPSHOT_LINEAGE_MISMATCH' src/ThesisPulse.Signal.Service/OptionChainRollbackReconciliation.cs
          grep -F 'AUTHORITY_VIOLATION' src/ThesisPulse.Signal.Service/OptionChainRollbackReconciliation.cs
          grep -F 'SelectionAuthority' src/ThesisPulse.Signal.Service/OptionChainRollbackReconciliation.cs
          grep -F 'ExecutionAuthority' src/ThesisPulse.Signal.Service/OptionChainRollbackReconciliation.cs
          grep -F '"AutomaticRollbackEnabled": false' src/ThesisPulse.Signal.Service/appsettings.json
          grep -F '"ExplicitRecoveryRequired": true' src/ThesisPulse.Signal.Service/appsettings.json
          grep -F '"LiveExecutionEnabled": false' src/ThesisPulse.Signal.Service/appsettings.json

      - name: Run Phase 4.11 regression
        shell: bash
        run: |
          grep -F 'CANARY_BUCKET_ADMITTED' src/ThesisPulse.Signal.Service/OptionChainCanaryRollout.cs
          grep -F 'RollbackRequired: breaches.Count > 0' src/ThesisPulse.Signal.Service/OptionChainCanaryRollout.cs

      - name: Run Phase 4.9 execution regression
        run: dotnet run --project tests/phase49-option-chain-execution/dotnet/ThesisPulse.Phase49OptionChainExecution.Tests.csproj --configuration Release

      - name: Run Phase 4.7 queue regression
        run: dotnet run --project tests/phase47-option-chain-worker/dotnet/ThesisPulse.Phase47OptionChainWorker.Tests.csproj --configuration Release
