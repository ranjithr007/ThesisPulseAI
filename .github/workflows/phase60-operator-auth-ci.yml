name: Phase 6.0 Operator Authentication CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [phase60-operator-auth]

permissions:
  contents: read

jobs:
  operator-authentication:
    name: Authentication safety and platform regressions
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ai-python/pyproject.toml

      - name: Validate authentication configuration
        shell: pwsh
        run: ./scripts/security/Test-ThesisPulseAuthenticationConfiguration.ps1

      - name: Restore .NET solution and authentication tests
        run: |
          dotnet restore ThesisPulseAI.sln
          dotnet restore tests/phase60-auth/dotnet/ThesisPulse.Phase60Authentication.Tests.csproj

      - name: Build .NET solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore --verbosity minimal

      - name: Run authentication tests
        run: dotnet run --project tests/phase60-auth/dotnet/ThesisPulse.Phase60Authentication.Tests.csproj --configuration Release --no-restore

      - name: Install Python project
        run: python -m pip install --upgrade pip && python -m pip install -e "./ai-python[dev]"

      - name: Lint Python
        working-directory: ai-python
        run: ruff check app tests

      - name: Test Python
        working-directory: ai-python
        run: pytest

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend-react
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend-react
        run: npm run build
