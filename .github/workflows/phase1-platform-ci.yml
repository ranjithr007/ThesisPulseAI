name: Phase 1 Platform CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - main
      - phase-1/platform-foundation

permissions:
  contents: read

jobs:
  dotnet:
    name: .NET build and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore ThesisPulseAI.sln
      - name: Build
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test ThesisPulseAI.sln --configuration Release --no-build --verbosity normal
      - name: Contract fixture tests
        run: dotnet run --project tests/contracts/dotnet/ThesisPulse.ContractTests.csproj --configuration Release --no-build
      - name: Database migrator tests
        run: dotnet run --project tests/database/dotnet/ThesisPulse.DatabaseMigrator.Tests.csproj --configuration Release --no-build
      - name: Market Data foundation tests
        run: dotnet run --project tests/marketdata/dotnet/ThesisPulse.MarketData.Tests.csproj --configuration Release
      - name: Market Data recovery tests
        run: dotnet run --project tests/marketdata-recovery/dotnet/ThesisPulse.MarketData.RecoveryTests.csproj --configuration Release

  python:
    name: Python lint and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Test
        run: pytest

  frontend:
    name: React typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
