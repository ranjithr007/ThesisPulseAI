name: Security Dependency Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Review dependency changes
        id: review
        continue-on-error: true
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          deny-licenses: AGPL-3.0-only, AGPL-3.0-or-later, SSPL-1.0
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 120

      - name: Summarize dependency policy findings
        if: always()
        shell: python
        env:
          VULNERABLE_CHANGES: ${{ steps.review.outputs.vulnerable-changes }}
          INVALID_LICENSE_CHANGES: ${{ steps.review.outputs.invalid-license-changes }}
          DENIED_CHANGES: ${{ steps.review.outputs.denied-changes }}
          DEPENDENCY_CHANGES: ${{ steps.review.outputs.dependency-changes }}
          COMMENT_CONTENT: ${{ steps.review.outputs.comment-content }}
          REVIEW_OUTCOME: ${{ steps.review.outcome }}
        run: |
          import json
          import os

          report = {
              "reviewOutcome": os.environ.get("REVIEW_OUTCOME", "unknown"),
              "dependencyChangeCount": 0,
              "commentContent": os.environ.get("COMMENT_CONTENT", "")[:4000],
              "vulnerable": [],
              "invalidLicense": [],
              "denied": [],
          }

          raw_changes = os.environ.get("DEPENDENCY_CHANGES", "").strip()
          if raw_changes:
              try:
                  changes = json.loads(raw_changes)
                  report["dependencyChangeCount"] = len(changes) if isinstance(changes, list) else 1
              except json.JSONDecodeError:
                  report["dependencyChangeCount"] = -1

          mappings = (
              ("vulnerable", "VULNERABLE_CHANGES"),
              ("invalidLicense", "INVALID_LICENSE_CHANGES"),
              ("denied", "DENIED_CHANGES"),
          )
          print(f"Dependency review outcome: {report['reviewOutcome']}")
          print(f"Dependency changes reported: {report['dependencyChangeCount']}")
          for label, variable in mappings:
              raw = os.environ.get(variable, "").strip()
              if not raw:
                  print(f"{label}: 0 reported changes")
                  continue
              try:
                  items = json.loads(raw)
              except json.JSONDecodeError:
                  report[label].append({"package": "unknown-package", "identifier": "invalid-json-output"})
                  print(f"{label}: output was not valid JSON")
                  continue
              if not isinstance(items, list):
                  items = [items]
              print(f"{label}: {len(items)} reported change(s)")
              for item in items:
                  if not isinstance(item, dict):
                      continue
                  package = (
                      item.get("package_url")
                      or item.get("packageUrl")
                      or item.get("name")
                      or item.get("dependencyName")
                      or "unknown-package"
                  )
                  identifier = (
                      item.get("ghsa_id")
                      or item.get("ghsaId")
                      or item.get("advisory_id")
                      or item.get("license")
                      or "no-advisory-or-license-id"
                  )
                  report[label].append({"package": str(package), "identifier": str(identifier)})
                  print(f"  - {package}: {identifier}")

          with open("dependency-review-diagnostics.json", "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2, sort_keys=True)

      - name: Upload dependency review diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-review-diagnostics
          path: dependency-review-diagnostics.json
          if-no-files-found: error
          retention-days: 7

      - name: Enforce dependency review result
        if: steps.review.outcome == 'failure'
        run: |
          echo "Dependency review failed. See the action summary and sanitized diagnostic artifact."
          exit 1
