name: Phase 3.4 Automatic PAPER Execution CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  acceptance:
    name: Automatic PAPER execution acceptance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Run Phase 3.4 acceptance
        shell: bash
        run: |
          set -o pipefail
          dotnet run --project tests/phase34-automatic-paper-execution/dotnet/ThesisPulse.Phase34AutomaticPaperExecution.Tests.csproj --configuration Release 2>&1 | tee phase34-tests.log
      - name: Upload Phase 3.4 diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: phase34-automatic-paper-execution-log
          path: phase34-tests.log
          if-no-files-found: error
          retention-days: 7
