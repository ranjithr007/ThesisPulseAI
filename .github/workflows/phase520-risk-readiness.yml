name: Phase 5.2 Risk Readiness CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [phase520-risk-readiness-workspace]

permissions:
  contents: read

jobs:
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Verify risk safety boundaries
        working-directory: .
        shell: bash
        run: |
          grep -F 'page: "risk"' frontend-react/src/routing/useAppRoute.ts
          grep -F 'failClosed' frontend-react/src/risk/RiskReadinessWorkspace.tsx
          grep -F 'executionAuthority' frontend-react/src/risk/RiskReadinessWorkspace.tsx
          grep -F 'brokerSubmissionAuthority' frontend-react/src/risk/RiskReadinessWorkspace.tsx
          grep -F 'cannot mutate' frontend-react/src/risk/RiskReadinessWorkspace.tsx
