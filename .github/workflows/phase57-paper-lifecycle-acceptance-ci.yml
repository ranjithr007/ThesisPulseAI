name: Phase 5.7 PAPER Lifecycle Acceptance CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [phase57-paper-lifecycle-acceptance]

permissions:
  contents: read

jobs:
  acceptance:
    name: Acceptance contracts, evaluator, PowerShell, and UI
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 8.0.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Validate lifecycle acceptance PowerShell syntax
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path '.\scripts\dev\Test-ThesisPulsePaperLifecycle.ps1'),
            [ref]$tokens,
            [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_.Message }
            exit 1
          }

      - name: Restore .NET solution
        run: dotnet restore ThesisPulseAI.sln

      - name: Build .NET solution
        run: dotnet build ThesisPulseAI.sln --configuration Release --no-restore --verbosity minimal

      - name: Run Phase 5.7 acceptance tests
        run: dotnet run --project tests/phase57-paper-lifecycle-acceptance/dotnet/ThesisPulse.Phase57PaperLifecycleAcceptance.Tests.csproj --configuration Release

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Typecheck frontend
        working-directory: frontend-react
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend-react
        run: npm run build
